<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acesso VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f4f7fb;
    min-height:100vh;
    overflow-x:hidden;
}

.background{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top right,#229ED91a,transparent 30%),
    radial-gradient(circle at bottom left,#229ED910,transparent 40%);
    z-index:-1;
}

.container{
    width:100%;
    max-width:500px;
    margin:auto;
    padding:20px 16px 40px;
}

.card{
    background:#fff;
    border-radius:28px;
    padding:22px;
    box-shadow:
    0 10px 30px rgba(0,0,0,.05),
    0 1px 2px rgba(0,0,0,.05);
}

.badge{
    background:#E8F6FD;
    color:#229ED9;
    display:table;
    margin:0 auto 18px;
    padding:8px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
}

.headline{
    text-align:center;
    font-size:28px;
    line-height:1.3;
    color:#111827;
    font-weight:400;
    margin-bottom:24px;
}

.headline span{
    color:#229ED9;
    font-weight:800;
}

.video-container{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    overflow:hidden;
    border-radius:22px;
    background:#000;
    box-shadow:0 20px 40px rgba(0,0,0,.12);
}

.video-container iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

.timer-box{
    margin-top:18px;
    text-align:center;
    color:#6B7280;
    font-size:14px;
    font-weight:600;
}

.telegram-btn{
    width:100%;
    border:none;
    border-radius:18px;
    padding:18px;
    margin-top:15px;
    font-size:17px;
    font-weight:700;
    color:white;
    background:#c5cad1;
    cursor:not-allowed;
    transition:.3s;
}

.telegram-btn.active{
    cursor:pointer;
    background:linear-gradient(135deg,#229ED9,#0088cc);
    box-shadow:0 15px 35px rgba(34,158,217,.35);
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.03);}
    100%{transform:scale(1);}
}

.copy-card{
    margin-top:18px;
    background:#fff;
    border:1px solid #E5E7EB;
    border-radius:20px;
    padding:16px;
}

.copy-label{
    font-size:13px;
    color:#6B7280;
    margin-bottom:10px;
    font-weight:600;
}

.copy-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.copy-link{
    flex:1;
    background:#F3F4F6;
    border-radius:14px;
    padding:14px;
    font-size:13px;
    color:#374151;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.copy-btn{
    border:none;
    background:#229ED9;
    color:#fff;
    padding:14px 18px;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.copy-btn:active{
    transform:scale(.95);
}

.status{
    display:none;
    margin-top:10px;
    color:#16A34A;
    font-size:13px;
    font-weight:700;
}

.footer{
    text-align:center;
    margin-top:18px;
    color:#9CA3AF;
    font-size:12px;
}

@media(max-width:480px){

    .headline{
        font-size:24px;
    }

    .card{
        padding:18px;
    }

}
    .warning-box{
    margin-top:18px;
    text-align:center;
    color:#dc2626;
    font-size:15px;
    font-weight:800;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:.3;
    }
}
    .depoimentos{
    margin-top:30px;
}

.depoimentos h3{
    text-align:center;
    font-size:18px;
    color:#111827;
    margin-bottom:18px;
    font-weight:800;
}

.depoimentos img{
    width:100%;
    display:block;
    border-radius:20px;
    margin-bottom:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.10);
}

.bottom-btn{
    margin-top:20px;
    margin-bottom:10px;
}

</style>
</head>
<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="badge">
            ACESSO VIP
        </div>

        <div class="headline">
            Assista o vídeo e
            <span>comece agora mesmo</span>
        </div>

        <div class="video-container">

            <iframe
            src="https://www.youtube.com/embed/zVrBA4UdxrM"
            title="Vídeo"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
            </iframe>

        </div>

      <div class="warning-box">
    ⚠️ Assista o vídeo acima para entrar no grupo grátis
</div>

        <button id="joinBtn" class="telegram-btn">
            ⏳ Aguarde...
        </button>

        <div class="copy-card">

            <div class="copy-label">
                Link alternativo
            </div>

            <div class="copy-box">

                <div class="copy-link">
                    https://t.me/+AVChMeYtD8thMzJh
                </div>

                <button class="copy-btn" onclick="copiarLink()">
                    Copiar
                </button>

            </div>

            <div class="status" id="status">
                ✓ Link copiado com sucesso
            </div>

        </div>

    </div>

    <div class="depoimentos">
<h3>Resultados dos participantes 👇</h3>

<img src="https://i.postimg.cc/QxxHrLb0/Whats-App-Image-2026-06-01-at-10-50-01.jpg" alt="Depoimento 1">

<img src="https://i.postimg.cc/RVVNzrRd/Whats-App-Image-2026-05-31-at-20-56-01.jpg" alt="Depoimento 2">

<img src="https://i.postimg.cc/jddLrVXv/e0803599-a3c2-47c4-a83e-43c11a341fd5.jpg" alt="Depoimento 3">

        </div>

    <div class="footer">
        Continue para acessar o conteúdo disponível.
    </div>

</div>

<script>

const telegramLink = "tg://join?invite=AVChMeYtD8thMzJh";
const linkAlternativo = "https://t.me/+AVChMeYtD8thMzJh";

const btn = document.getElementById("joinBtn");
btn.classList.add("active");

btn.innerHTML = "🚀 Entrar no Grupo VIP";

btn.onclick = ()=>{
    window.location.href = telegramLink;
};

function copiarLink(){

    navigator.clipboard.writeText(linkAlternativo);

    const status = document.getElementById("status");

    status.style.display = "block";

    setTimeout(()=>{
        status.style.display = "none";
    },2500);

}

/* Redirecionamento automático */
setTimeout(()=>{
    window.location.href = telegramLink;
},1500);

</script>

</body>
</html>
