<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entre AGORA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --off-white: #f8fafc;
    --gray-50: #f1f5f9;
    --gray-100: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-800: #1e293b;
    --gray-900: #0f172a;
    --green-wa: #25D366;
    --green-dark: #128C7E;
    --green-light: #dcfce7;
    --green-mid: #16a34a;
    --accent: #22c55e;
    --red-alert: #ef4444;
    --orange: #f97316;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--white);
    color: var(--gray-900);
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #f0fdf4 100%);
    position: relative;
  }

  /* Subtle background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 20%, rgba(34,197,94,0.06) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(37,211,102,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── TOP BADGE ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    color: var(--green-mid);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 18px;
    border: 1px solid #bbf7d0;
    animation: fadeUp 0.6s 0.05s ease both;
  }

  .badge svg { width: 12px; height: 12px; }

  /* ── HEADLINE ── */
  .headline-wrap {
    text-align: center;
    margin-bottom: 10px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .money {
    font-size: clamp(42px, 11vw, 60px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--gray-900);
    display: block;
  }

  .money span {
    color: var(--green-wa);
  }

  .per-day {
    font-size: 18px;
    font-weight: 800;
    color: var(--green-mid);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: block;
    margin-top: 6px;
  }

  /* ── SUBHEADLINE ── */
  .sub {
    text-align: center;
    font-size: 15px;
    font-weight: 500;
    color: var(--gray-600);
    line-height: 1.55;
    max-width: 310px;
    margin-bottom: 22px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  /* ── VAGAS ALERT ── */
  .vagas-bar {
    width: 100%;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .vagas-icon {
    width: 32px;
    height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .vagas-icon svg { width: 17px; height: 17px; color: #fff; }

  .vagas-text { flex: 1; }

  .vagas-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .vagas-count {
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-800);
    margin-top: 2px;
  }

  .vagas-count .num {
    color: var(--red-alert);
    font-size: 15px;
  }

  /* progress bar */
  .progress-track {
    width: 100%;
    height: 5px;
    background: #fed7aa;
    border-radius: 100px;
    margin-top: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--orange), var(--red-alert));
    animation: shrink 18s linear forwards;
  }

  @keyframes shrink {
    from { width: 85%; }
    to   { width: 12%; }
  }

  /* ── CTA BUTTON ── */
  .cta-wrap {
    width: 100%;
    margin-bottom: 18px;
    animation: fadeUp 0.6s 0.25s ease both;
  }

  .cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 17px 24px;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    text-decoration: none;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(34,197,94,0.40), 0 1px 4px rgba(0,0,0,0.08);
    animation: pulse 2s ease-in-out infinite;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    letter-spacing: 0.01em;
  }

  .cta:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 32px rgba(34,197,94,0.50), 0 2px 8px rgba(0,0,0,0.1);
    animation: none;
  }

  .cta:active {
    transform: scale(0.98);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 24px rgba(34,197,94,0.40); transform: scale(1); }
    50%       { box-shadow: 0 6px 36px rgba(34,197,94,0.65); transform: scale(1.015); }
  }

  .cta svg { width: 22px; height: 22px; flex-shrink: 0; }

  /* ── IMAGE ── */
  .img-wrap {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.10);
    animation: fadeUp 0.6s 0.3s ease both;
    border: 1px solid var(--gray-100);
  }

  .img-wrap img {
    width: 100%;
    display: block;
    object-fit: cover;
  }

  /* ── TRUST ROW ── */
  .trust {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
    animation: fadeUp 0.6s 0.35s ease both;
  }

  .trust-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-400);
  }

  .trust-item svg { width: 13px; height: 13px; color: var(--accent); }

  /* ── FOOTER ── */
  .footer {
    margin-top: 16px;
    font-size: 10px;
    color: var(--gray-300);
    text-align: center;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  /* Counter animation */
  @keyframes countDown {
    0%   { content: "7"; }
    14%  { content: "6"; }
    28%  { content: "5"; }
    42%  { content: "4"; }
    56%  { content: "3"; }
    70%  { content: "2"; }
    84%  { content: "1"; }
    100% { content: "1"; }
  }

  /* Responsive */
  @media (max-height: 680px) {
    .card { gap: 0; }
    .badge { margin-bottom: 12px; }
    .money { font-size: 44px; }
    .sub { font-size: 13px; margin-bottom: 14px; }
    .vagas-bar { margin-bottom: 14px; padding: 8px 14px; }
    .cta { padding: 14px 20px; font-size: 15px; }
    .img-wrap img { max-height: unset; }
    .trust { margin-top: 12px; }
  }
</style>
</head>

<script>
  // Counter decrement simulation
  const el = document.getElementById('counter');
  let count = 7;
  const interval = setInterval(() => {
    if (count > 1) {
      count--;
      el.textContent = count;
      // flash red
      el.style.transform = 'scale(1.3)';
      el.style.transition = 'transform 0.15s ease';
      setTimeout(() => { el.style.transform = 'scale(1)'; }, 200);
    } else {
      clearInterval(interval);
    }
  }, Math.floor(Math.random() * 8000) + 6000); // random between 6-14s
</script>
